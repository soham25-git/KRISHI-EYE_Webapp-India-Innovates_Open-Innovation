services:
  - type: web
    name: krishi-eye-api
    env: docker
    dockerfilePath: apps/api/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: krishi-eye-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: AI_SERVICE_URL
        fromStack:
          service: krishi-eye-ai
          property: url

  - type: web
    name: krishi-eye-ai
    env: python
    rootDir: apps/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: krishi-eye-db
          property: connectionString
      - key: LLM_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: krishi-eye-db
    plan: free
    region: singapore
